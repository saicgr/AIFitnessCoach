name: fitwiz
description: "AI-powered fitness coaching app with personalized workouts"
publish_to: 'none'
version: 1.2.67+1140

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.3.1
  flutter_cache_manager: ^3.4.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  flutter_staggered_animations: ^1.1.1
  sprung: ^3.0.1
  fl_chart: ^0.69.0
  confetti: ^0.7.0
  glassmorphism: ^3.0.0
  simple_circular_progress_bar: ^1.0.2
  lottie: ^3.1.0
  flutter_svg: ^2.0.10+1

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.4.3+1
  # HTTP/2 transport for Dio. Multiplexes 12+ parallel post-sign-in prewarmer
  # requests onto ONE persistent TCP+TLS connection (vs HTTP/1.1's 6-per-host
  # serialization). Falls back to HTTP/1.1 automatically per-request when the
  # server doesn't negotiate h2.
  dio_http2_adapter: ^2.5.0
  http_parser: ^4.0.0

  # Auth
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.3
  flutter_secure_storage: ^10.0.0
  supabase_flutter: ^2.8.4

  # Navigation
  go_router: ^14.2.0

  # Video
  video_player: ^2.9.2
  video_compress: ^3.1.3
  video_thumbnail: ^0.5.3

  # Utils
  # intl bumped 0.19 -> 0.20.2 (2026-05-24) to satisfy flutter_localizations
  # constraint added for Phase 5 i18n. Existing intl callers compile clean
  # against 0.20.x (formatter API unchanged).
  intl: ^0.20.2
  # Phase 5 i18n — pinned by Flutter version; bundles ARB-driven generated
  # AppLocalizations for the 8 Gravl-parity locales (en/es/de/fr/it/pt/cs/pl).
  flutter_localizations:
    sdk: flutter
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  uuid: ^4.4.2
  shared_preferences: ^2.2.3
  vibration: ^2.0.0
  timeago: ^3.7.0
  cryptography: ^2.7.0

  # Health Connect / HealthKit
  # Bumped 11.x -> 12.x (2026-05-22) for the cycle tracker: 12.x adds
  # MENSTRUATION_FLOW read/write support and wrist/body-temperature reads
  # (Apple Watch sleeping wrist temperature) needed to feed the BBT graph
  # without manual logging. Steps/sleep/weight sync is unaffected by the bump.
  health: ^12.2.1
  permission_handler: ^11.3.1

  # BLE Heart Rate Monitor
  flutter_reactive_ble: ^5.3.1

  # Location & Maps (for gym profile location)
  geolocator: ^13.0.2
  # google_maps_flutter: ^2.9.0  # Removed for v1 — re-add when Maps API key is configured

  # OSM-based map for HealthKit GPS route rendering (iOS-only render path).
  # iOS GPS re-add — Google Play scope declaration pending; Android map UI
  # hidden via Platform.isIOS gate in route_map.dart. No API key required
  # (free OSM tile server with attribution).
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Firebase / Notifications
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6
  firebase_crashlytics: ^4.3.2
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # File operations
  file_picker: ^8.0.0+1
  file_saver: ^0.2.14
  share_plus: ^10.1.4
  path_provider: ^2.1.3
  url_launcher: ^6.2.5
  # Universal Links / App Links ingress. Handles both https://fitwiz.us/...
  # and custom fitwiz:// schemes from OS-level opens (Safari tap, SMS,
  # share sheets). Pairs with PendingReferralService for /invite/{code}
  # capture across cold-start and background → foreground transitions.
  app_links: ^6.3.2

  # Inbound system share-sheet ingress. Wraps the iOS Share Extension + the
  # Android ACTION_SEND / ACTION_SEND_MULTIPLE intent-filters into a single
  # Dart stream. Powers the Imports feature (Profile → Imports).
  receive_sharing_intent: ^1.8.0

  # In-App Purchases
  purchases_flutter: ^8.1.0

  # Analytics & Device Info
  posthog_flutter: ^4.0.0
  device_info_plus: ^10.1.0
  package_info_plus: ^8.0.0

  # In-app rating prompt — wraps SKStoreReviewController (iOS) and Play
  # Core ReviewManager (Android) with a single Flutter API. Used by
  # RatingPromptService at "happy moments" (3rd workout completed,
  # 3rd meal logged, 3rd menu scan) following the two-step pattern
  # (custom pre-prompt → system review sheet only on positive response).
  in_app_review: ^2.0.9

  # Error tracking (runs alongside Firebase Crashlytics; no Discord changes)
  sentry_flutter: ^8.9.0
  sentry_dio: ^8.9.0

  # Barcode Scanning
  mobile_scanner: ^7.0.0

  # Image Picker (for food photos)
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  # Pixel-level image manipulation (flip/rotate in progress photo editor)
  image: ^4.3.0
  # Phase-2 food-scan: in-memory resize to 768px for Vision API thumb (single
  # Gemini tile = 4× cheaper + faster). Original full-res still uploaded to S3.
  flutter_image_compress: ^2.3.0
  # In-app live camera preview (Snapchat-style capture in recipe import)
  camera: ^0.11.0
  speech_to_text: ^7.3.0

  # Audio Recording (for exercise notes voice memos)
  record: ^6.2.0

  # Gallery Saver (for saving workout images to device gallery)
  gal: ^2.3.0

  # PDF Generation (for stats export)
  pdf: ^3.11.1

  # Text-to-Speech (for voice announcements during workouts)
  flutter_tts: ^4.2.0

  # Audio Session (for mixing with music apps like Spotify)
  audio_session: ^0.1.21

  # Audio Playback (for workout chimes and sound effects)
  audioplayers: ^6.1.0

  # Home Screen Widgets
  home_widget: ^0.7.0

  # Tutorial/Coach Mark for App Tour
  tutorial_coach_mark: ^1.2.11

  # Muscle Selector (Human Body Diagram) — used by avoided_muscles_screen
  muscle_selector: ^1.0.4

  # High-fidelity anatomical body atlas with L/R muscle IDs + tap callbacks.
  # Used by the Body Measurements screen (MeasurementBodyView).
  # SVG art is CC BY 4.0 (Ryan Graves) — attribution required in app credits.
  flutter_body_atlas: ^0.1.4

  # Liquid Progress Indicator (for hydration body animation)
  liquid_progress_indicator_v2: ^0.5.0

  # Offline Mode
  drift: ^2.20.0
  sqlcipher_flutter_libs: ^0.6.4
  connectivity_plus: ^6.1.0
  workmanager: ^0.9.0
  flutter_gemma: ^0.11.16
  system_info_plus: ^0.0.6

  # Splash Screen
  flutter_native_splash: ^2.4.0

  # Social Media Icons
  font_awesome_flutter: ^10.7.0

  # Social Section Expansion
  smooth_page_indicator: ^1.2.0+3
  visibility_detector: ^0.4.0+2
  flutter_timezone: ^5.0.2

  # Live Activities (iOS Dynamic Island) + screen wake during workouts.
  # Pinned to 2.4.3 — 2.4.4+ bumps permission_handler to ^12 which would
  # cascade-break other permission flows in the app. 2.4.3 still supports
  # iOS 16.1+ Dynamic Island.
  live_activities: 2.4.3
  wakelock_plus: ^1.2.8
  flutter_quick_video_encoder: ^1.7.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  mocktail: ^1.0.4
  network_image_mock: ^2.1.1
  flutter_launcher_icons: ^0.14.3
  drift_dev: ^2.20.0

# App Icon Configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  # Android Adaptive Icon with shadow background
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  adaptive_icon_foreground_inset: 16
  # iOS settings
  remove_alpha_ios: true

flutter_native_splash:
  color: "#000000"
  image: assets/icon/splash_logo.png
  android: true
  ios: true
  android_12:
    color: "#000000"
    icon_background_color: "#000000"
    image: assets/icon/splash_logo.png

flutter:
  uses-material-design: true
  generate: true   # Phase 5 — enables flutter gen-l10n from lib/l10n/*.arb (see l10n.yaml).

  assets:
    - assets/icon/
    - assets/images/
    - assets/images/workout_types/
    - assets/images/intro/
    - assets/images/coaches/
    - assets/lottie/
    - assets/data/
    - assets/images/muscles/
    - assets/images/exercises/
    - assets/audio/countdown/
    - assets/audio/exercise_complete/
    - assets/audio/workout_complete/
    - assets/audio/rest_end/
    - assets/svg/
    - assets/images/shareable_backgrounds/workout/
    - assets/images/shareable_backgrounds/nutrition/
    - assets/images/shareable_backgrounds/abstract/
    - assets/mascot/shark/
    - assets/fonts/

  # Bundled OFL display faces for the shareables redesign (Anton = display
  # grotesque, Barlow Condensed = labels/ledger, Space Mono = mono, Fraunces =
  # editorial serif, Archivo = alt grotesque). All SIL Open Font License.
  fonts:
    - family: Anton
      fonts:
        - asset: assets/fonts/Anton-Regular.ttf
    - family: Barlow Condensed
      fonts:
        - asset: assets/fonts/BarlowCondensed-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/BarlowCondensed-Bold.ttf
          weight: 700
        - asset: assets/fonts/BarlowCondensed-ExtraBold.ttf
          weight: 800
    - family: Space Mono
      fonts:
        - asset: assets/fonts/SpaceMono-Regular.ttf
        - asset: assets/fonts/SpaceMono-Bold.ttf
          weight: 700
    - family: Fraunces
      fonts:
        - asset: assets/fonts/Fraunces.ttf
    - family: Archivo
      fonts:
        - asset: assets/fonts/Archivo.ttf
