name: Android Release Build

# Builds the FitWiz consumer-flavor Android App Bundle (AAB) and uploads
# it to Google Play's internal testing track. Triggered manually so we
# don't accidentally ship every push to main.
#
# Required GitHub repository secrets:
#   - GOOGLE_SERVICES_JSON_BASE64    base64-encoded `google-services.json`
#                                     (run `base64 -i google-services.json | pbcopy`
#                                      on macOS, then paste into the secret)
#   - ANDROID_KEYSTORE_BASE64         base64-encoded release keystore (.jks)
#   - ANDROID_KEYSTORE_PASSWORD       keystore password
#   - ANDROID_KEY_ALIAS               alias name (e.g. "release")
#   - ANDROID_KEY_PASSWORD            key password
#   - PLAY_SERVICE_ACCOUNT_JSON       JSON for Play Console service account
#                                     with "Release manager" role on this app
#
# To add: GitHub → Repo → Settings → Secrets and variables → Actions → New
#         repository secret.

on:
  workflow_dispatch:
    inputs:
      track:
        description: "Play Console track"
        required: true
        default: "internal"
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter 3.38.10
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.10"
          channel: stable
          cache: true

      - name: Decode google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" \
            | base64 --decode \
            > mobile/flutter/android/app/google-services.json
          # Sanity check — fail loudly rather than build a Firebase-less APK.
          if ! grep -q "project_info" mobile/flutter/android/app/google-services.json; then
            echo "::error::google-services.json decode failed or secret missing"
            exit 1
          fi

      - name: Decode release keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" \
            | base64 --decode \
            > mobile/flutter/android/app/release.keystore

      - name: Write key.properties
        run: |
          cat > mobile/flutter/android/key.properties <<EOF
          storeFile=release.keystore
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Pub get
        working-directory: mobile/flutter
        run: flutter pub get

      - name: Build AAB
        working-directory: mobile/flutter
        run: |
          flutter build appbundle \
            --release \
            --dart-define=REVENUECAT_ANDROID_KEY=${{ secrets.REVENUECAT_ANDROID_KEY }} \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.aab
          path: mobile/flutter/build/app/outputs/bundle/release/app-release.aab
          retention-days: 14

      - name: Upload to Play Console (${{ inputs.track }})
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.aifitnesscoach.app
          releaseFiles: mobile/flutter/build/app/outputs/bundle/release/app-release.aab
          track: ${{ inputs.track }}
          status: completed

      - name: Cleanup secrets from runner
        if: always()
        run: |
          rm -f mobile/flutter/android/app/google-services.json
          rm -f mobile/flutter/android/app/release.keystore
          rm -f mobile/flutter/android/key.properties
