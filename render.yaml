# Render deployment configuration
# This file configures the deployment pipeline including pre-deploy tests
#
# Environment variables to control test behavior:
# - SKIP_TESTS=true: Skip all tests (fastest deployment)
# - RUN_CRITICAL_ONLY=true: Run only critical tests
# - (default): Run ALL tests

services:
  - type: web
    name: fitwiz-backend
    env: python
    region: ohio
    # ── BILLING / OPS DECISION (Phase D) ─────────────────────────────────
    # `plan` is left at `standard` (2 GB / 1 CPU) intentionally — changing it
    # is a billing decision and must be confirmed by a human before deploy.
    #
    # The startCommand below runs -w 4 (4 gunicorn workers). 4 workers on a
    # 1-CPU `standard` instance OVER-SUBSCRIBES the CPU. Rule of thumb is
    # ~1-2× CPU cores per worker count, so:
    #   - `standard` (1 CPU)      → -w 2 is the right match
    #   - `standard-plus`/`pro`   → 2-4 CPU → -w 4 is the right match
    # Before deploying with -w 4, RAISE `plan` to a multi-core tier
    # (standard-plus or pro) so workers ≈ 1-2× cores and the 2 GB → larger
    # RAM holds 4 app copies. If you must stay on `standard`, drop -w 4 to
    # -w 2 in the startCommand. This is a billing decision — do not assume.
    #
    # Pinned here so a blueprint sync never silently downgrades the service.
    plan: standard
    branch: main
    rootDir: backend
    buildCommand: chmod +x build.sh && ./build.sh
    # Horizontal autoscaling (Phase D). Render adds/removes instances between
    # minInstances and maxInstances to keep average CPU near targetCPUPercent.
    # minInstances: 2 keeps a warm spare so a single-instance failure or a
    # deploy never drops the service to zero capacity.
    scaling:
      minInstances: 2
      maxInstances: 8
      targetCPUPercent: 70
    # -w 4 → 4 workers → 4 event loops per instance. Worker count should be
    # ~1-2× CPU cores of the instance plan (see BILLING / OPS note above).
    # A single ~20s workout-generation request can no longer freeze the whole
    # worker pool (2026-05-16 incident). --timeout 180 covers SSE generation.
    startCommand: gunicorn main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 180
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false

  # Two-way OAuth sync cron. Every 15 min: drains oauth_sync_webhook_events
  # queue + pulls accounts whose last_sync_at is older than 15 min. See
  # backend/services/sync/sync_orchestrator.py for the main entry point.
  #
  # Requires these additional env vars (all set via Render dashboard, sync: false):
  #   OAUTH_TOKEN_ENCRYPTION_KEY  (Fernet key)
  #   STRAVA_CLIENT_ID / STRAVA_CLIENT_SECRET / STRAVA_VERIFY_TOKEN
  #   GARMIN_CLIENT_ID / GARMIN_CLIENT_SECRET
  #   FITBIT_CLIENT_ID / FITBIT_CLIENT_SECRET
  #   PELOTON_EMAIL / PELOTON_PASSWORD (optional)
  - type: cron
    name: fitwiz-sync
    schedule: "*/15 * * * *"
    env: python
    region: ohio
    plan: starter
    branch: main
    rootDir: backend
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: python -m services.sync.sync_orchestrator --once
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: OAUTH_TOKEN_ENCRYPTION_KEY
        sync: false
      - key: STRAVA_CLIENT_ID
        sync: false
      - key: STRAVA_CLIENT_SECRET
        sync: false
      - key: STRAVA_VERIFY_TOKEN
        sync: false
      - key: GARMIN_CLIENT_ID
        sync: false
      - key: GARMIN_CLIENT_SECRET
        sync: false
      - key: FITBIT_CLIENT_ID
        sync: false
      - key: FITBIT_CLIENT_SECRET
        sync: false
      - key: PELOTON_EMAIL
        sync: false
      - key: PELOTON_PASSWORD
        sync: false

  # Phase-2 §2.10: Cross-user dish-promotion job. Daily at 03:00 UTC (low-traffic
  # window). Finds dishes ≥5 distinct users have logged with calorie CV<20%,
  # excludes user_edited rows, promotes them into food_nutrition_overrides
  # with source='auto_promoted'. Idempotent — re-running won't double-promote.
  #
  # Knobs (env, set via Render dashboard if you want to override defaults):
  #   PROMOTION_MIN_USERS  (default 5)  — min distinct users for promotion
  #   PROMOTION_MAX_CV     (default 0.20) — max coefficient of variation on cal
  #   PROMOTION_DRY_RUN    (default 0)  — set to 1 to log without writing
  #
  # Backout for accidentally-promoted bad data:
  #   UPDATE food_nutrition_overrides SET nutrient_source='gemini_estimate'
  #   WHERE auto_promoted_at IS NOT NULL;
  - type: cron
    name: fitwiz-promote-user-contributed
    schedule: "0 3 * * *"
    env: python
    region: ohio
    plan: starter
    branch: main
    rootDir: backend
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: python -m scripts.promote_user_contributed
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DATABASE_URL
        sync: false

