# Render deployment configuration
# This file configures the deployment pipeline including pre-deploy tests
#
# Environment variables to control test behavior:
# - SKIP_TESTS=true: Skip all tests (fastest deployment)
# - RUN_CRITICAL_ONLY=true: Run only critical tests
# - (default): Run ALL tests

services:
  - type: web
    name: fitwiz-backend
    env: python
    region: ohio
    # ── Plan + worker sizing (Phase D) ───────────────────────────────────
    # `standard` = 1 CPU / 2 GB. Worker count is matched TO this plan:
    # for an async (I/O-bound) FastAPI app the modern rule is ~1-2 workers
    # per CPU core (NOT the sync `(2*cores)+1` formula). 1 CPU + the app's
    # ~0.8-1 GB-per-worker footprint (Gemini/RAG/ChromaDB/LangGraph) → -w 2
    # is the correct match: 2 workers fit in 2 GB and a single ~20s
    # workout-generation request can't freeze the whole pool.
    #
    # If usage grows: bump `plan` to `pro` (2 CPU/4 GB → -w 2) or `pro plus`
    # (4 CPU/8 GB → -w 4) and raise the worker count to match the new core
    # count. Always keep workers ≈ 1-2× CPU cores. Pinned so a blueprint
    # sync never silently downgrades the service.
    plan: standard
    branch: main
    rootDir: backend
    buildCommand: chmod +x build.sh && ./build.sh
    # Horizontal autoscaling (Phase D) — the real lever for a traffic spike.
    # Render adds/removes instances between minInstances and maxInstances to
    # keep average CPU near targetCPUPercent. minInstances: 1 keeps cost at
    # one instance for normal (low) traffic; maxInstances: 8 lets it scale
    # out automatically if load ever spikes — no code change needed.
    scaling:
      minInstances: 1
      maxInstances: 8
      targetCPUPercent: 70
    # -w 2 → 2 workers → 2 event loops, matched to the 1-CPU `standard` plan
    # (see plan note above). --timeout 180 covers SSE streaming/generation.
    startCommand: gunicorn main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 180
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false

  # Two-way OAuth sync cron. Every 15 min: drains oauth_sync_webhook_events
  # queue + pulls accounts whose last_sync_at is older than 15 min. See
  # backend/services/sync/sync_orchestrator.py for the main entry point.
  #
  # Requires these additional env vars (all set via Render dashboard, sync: false):
  #   OAUTH_TOKEN_ENCRYPTION_KEY  (Fernet key)
  #   STRAVA_CLIENT_ID / STRAVA_CLIENT_SECRET / STRAVA_VERIFY_TOKEN
  #   GARMIN_CLIENT_ID / GARMIN_CLIENT_SECRET
  #   FITBIT_CLIENT_ID / FITBIT_CLIENT_SECRET
  #   PELOTON_EMAIL / PELOTON_PASSWORD (optional)
  - type: cron
    name: fitwiz-sync
    schedule: "*/15 * * * *"
    env: python
    region: ohio
    plan: starter
    branch: main
    rootDir: backend
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: python -m services.sync.sync_orchestrator --once
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: OAUTH_TOKEN_ENCRYPTION_KEY
        sync: false
      - key: STRAVA_CLIENT_ID
        sync: false
      - key: STRAVA_CLIENT_SECRET
        sync: false
      - key: STRAVA_VERIFY_TOKEN
        sync: false
      - key: GARMIN_CLIENT_ID
        sync: false
      - key: GARMIN_CLIENT_SECRET
        sync: false
      - key: FITBIT_CLIENT_ID
        sync: false
      - key: FITBIT_CLIENT_SECRET
        sync: false
      - key: PELOTON_EMAIL
        sync: false
      - key: PELOTON_PASSWORD
        sync: false

  # Phase-2 §2.10: Cross-user dish-promotion job. Daily at 03:00 UTC (low-traffic
  # window). Finds dishes ≥5 distinct users have logged with calorie CV<20%,
  # excludes user_edited rows, promotes them into food_nutrition_overrides
  # with source='auto_promoted'. Idempotent — re-running won't double-promote.
  #
  # Knobs (env, set via Render dashboard if you want to override defaults):
  #   PROMOTION_MIN_USERS  (default 5)  — min distinct users for promotion
  #   PROMOTION_MAX_CV     (default 0.20) — max coefficient of variation on cal
  #   PROMOTION_DRY_RUN    (default 0)  — set to 1 to log without writing
  #
  # Backout for accidentally-promoted bad data:
  #   UPDATE food_nutrition_overrides SET nutrient_source='gemini_estimate'
  #   WHERE auto_promoted_at IS NOT NULL;
  - type: cron
    name: fitwiz-promote-user-contributed
    schedule: "0 3 * * *"
    env: python
    region: ohio
    plan: starter
    branch: main
    rootDir: backend
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: python -m scripts.promote_user_contributed
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DATABASE_URL
        sync: false

  # Coach-memory nightly reflection (migration 2217). Daily at 03:30 UTC.
  # Deterministic (no LLM): dedupe/decay/archive stale episodics, expire
  # exhausted open loops, promote recurring episodics to durable semantic
  # facts, and run a conservative derived-insight pass (e.g. "tends to skip
  # Fridays"). Idempotent. See backend/services/coach/memory/pipeline.py.
  - type: cron
    name: fitwiz-memory-consolidate
    schedule: "30 3 * * *"
    env: python
    region: ohio
    plan: starter
    branch: main
    rootDir: backend
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: python -m scripts.consolidate_memory
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

