<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Fonts are self-hosted via @fontsource imports in src/index.css -->
    <meta name="theme-color" content="#050505" />
    <!-- iOS Safari smart banner — sitewide default; tool pages override
         app-argument per-slug in CalculatorShell. -->
    <meta name="apple-itunes-app" content="app-id=6745218419" />
    <title>%BRAND_FULL_TITLE%</title>
    <meta name="description" content="AI %BRAND_TAGLINE%" />
    <meta property="og:title" content="%BRAND_FULL_TITLE%" />
    <meta property="og:site_name" content="%BRAND_NAME%" />
    <meta property="og:url" content="%BRAND_WEBSITE%/" />
    <script>
      // Pre-React theme bootstrap. Applies the stored theme before hydration
      // to avoid a light-flash, and tags tool/glossary/best/vs routes with
      // `tool-route` so the light-mode zinc-palette remap in index.css can
      // scope to them before first paint.
      (function () {
        try {
          var path = window.location.pathname;
          var isToolRoute = /^(\/free-tools|\/glossary|\/best-|\/vs\/|\/blog)/.test(path);
          var stored = null;
          try {
            var raw = localStorage.getItem('fitness-coach-storage');
            if (raw) {
              var parsed = JSON.parse(raw);
              stored = (parsed && parsed.state && parsed.state.theme) || null;
            }
          } catch (_) {}
          var theme = stored || 'dark';
          if (theme === 'dark') document.documentElement.classList.add('dark-mode');
          if (isToolRoute) document.documentElement.classList.add('tool-route');
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
