    - generic [ref=e258]:
      - heading "Why gym-focused users pick Zealova over Google Health" [level=2] [ref=e259]
      - generic [ref=e260]:
        - generic [ref=e261]:
          - heading "Food photo logging built for real meals" [level=3] [ref=e262]
          - paragraph [ref=e263]: "Photograph a single plate or a 10-dish buffet spread. Zealova accepts up to 10 photos per meal and runs 4 analysis modes: auto, plate, menu, and buffet. The AI extracts individual items, calories, macros, and micronutrients per item, then auto-logs everything to your diary. Google Health Coach also supports meal photo logging, but with a single-image flow."
          - img "Zealova food photo logging with multi-image input on Android phone" [ref=e264]
        - generic [ref=e265]:
          - heading "No hardware required" [level=3] [ref=e266]
          - paragraph [ref=e267]: "Google Health's AI Coach is optimized for the Fitbit Air ecosystem. Continuous biometrics like HR, HRV, and sleep stages require a paired compatible wearable. And here's the research context: a 2017 Stanford study found that across 7 wrist-worn devices, energy expenditure error ranged from 27% to 93%. No device came close to accurate calorie burn (Shcherbina et al., 2017, Journal of Personalized Medicine). Heart rate was fine. Calories were not. Zealova runs full-featured on any Android phone and doesn't rely on wearable calorie estimates."
        - generic [ref=e268]:
          - heading "Full monthly workout plans, not just suggestions" [level=3] [ref=e269]
          - paragraph [ref=e270]: Google Health Coach lets you create custom workouts and get workout suggestions. Zealova generates a complete personalized monthly workout plan based on your goals, equipment, injury history, and schedule. The plan adapts as you complete sessions and log feedback.
          - img "Zealova AI-generated monthly workout plan on Android phone" [ref=e271]
        - generic [ref=e272]:
          - heading "5 specialist sub-agents in one chat" [level=3] [ref=e273]
          - paragraph [ref=e274]: "Zealova routes your message to the right specialist automatically: Workout, Nutrition, Injury, Hydration, or General Coach. Ask about a knee injury and the Injury agent finds safe alternatives from the exercise library. Ask about your macros and Nutrition handles it. Google Health's announced AI Coach supports natural-language workout creation, but the launch spec does not mention injury-aware exercise alternatives."
          - img "Zealova multi-agent chat coach with 5 specialist sub-agents on Android" [ref=e275]
        - generic [ref=e276]:
          - heading "History per exercise and per muscle" [level=3] [ref=e277]
          - paragraph [ref=e278]: Zealova tracks every lift's full history and each muscle group's volume separately. Not just weekly aggregate stats. You can see bench press history, squat history, chest volume, back volume, all individually. Google Health shows workout summaries.
          - img "Zealova per-exercise and per-muscle workout history tracking on Android" [ref=e279]
        - generic [ref=e280]:
          - heading "Take your data anywhere (10 export formats)" [level=3] [ref=e281]
          - paragraph [ref=e282]: Zealova exports completed workouts to Hevy, Strong, Fitbod, CSV, JSON, XLSX, PDF, TCX, GPX, and Parquet. Google Health doesn't offer third-party workout export. If you ever switch apps, your lifting history goes with you.
          - img "Zealova workout export options showing 10 formats including Hevy and Fitbod" [ref=e283]
    - generic [ref=e284]:
      - heading "Where Zealova wins" [level=2] [ref=e285]
      - list [ref=e286]:
        - listitem [ref=e287]:
          - generic [ref=e288]: +
          - generic [ref=e289]:
            - paragraph [ref=e290]: No hardware required, and wearable calorie data is less reliable than it looks
            - paragraph [ref=e291]: "Full AI coaching from day one on any Android phone. No tracker purchase needed. Google Health's AI Coach is optimized for the Fitbit Air ecosystem and needs a paired wearable for continuous biometrics. The broader problem: a 2017 Stanford study (Shcherbina et al., Journal of Personalized Medicine) tested 7 wrist-worn devices including the Fitbit Surge and found no device achieved energy expenditure error below 20%. The best was off by 27%. The worst by 93%. Heart rate was accurate. Calorie burn was not. Zealova doesn't use wearable calorie estimates in its coaching. It uses what you log."
        - listitem [ref=e292]:
          - generic [ref=e293]: +
          - generic [ref=e294]:
            - paragraph [ref=e295]: Multi-image food logging, and adherence is the real bottleneck
            - paragraph [ref=e296]: "Photograph a single plate, a multi-dish buffet, or anything in between. Zealova accepts up to 10 photos, runs 4 analysis modes, and extracts items, calories, macros, and micronutrients per item. The research case for faster logging: Burke, Wang & Sevick (2011, Journal of the American Dietetic Association) found more frequent self-monitoring was consistently and significantly associated with weight loss. Turner-McGrievy et al. (2019, Journal of the Academy of Nutrition and Dietetics) found tracking frequency explained the most variance in weight loss outcomes (R²=0.27). The point: the app that makes it easier to log daily wins on outcomes, not the one with the most precise algorithm."
        - listitem [ref=e297]:
          - generic [ref=e298]: +
          - generic [ref=e299]:
            - paragraph [ref=e300]: Full AI-generated workout plans, not just suggestions
            - paragraph [ref=e301]: "Zealova generates a complete personalized monthly plan based on your goals, equipment, injury history, and schedule. Google Health Coach creates workout suggestions and custom workouts via natural language. Those are different things. Structured progressive programming matters: Schoenfeld, Ogborn & Krieger (2017, Journal of Sports Science) found a clear dose-response between weekly training volume and muscle growth. Plans that track and progress your volume per muscle group outperform ad-hoc suggestions over time."
        - listitem [ref=e302]:
          - generic [ref=e303]: +
          - generic [ref=e304]:
            - paragraph [ref=e305]: Injury-aware exercise swaps
            - paragraph [ref=e306]: Ask the chat coach about a knee or shoulder issue and it finds safe alternatives from the exercise library. Google Health's announced AI Coach supports natural-language workout creation, but the launch spec does not mention injury-aware exercise alternatives.
        - listitem [ref=e307]:
          - generic [ref=e308]: +
          - generic [ref=e309]:
            - paragraph [ref=e310]: Per-exercise and per-muscle workout history
            - paragraph [ref=e311]: Every lift's full history and each muscle group's volume tracked separately. Not just aggregate weekly stats. Google Health shows workout summaries.
        - listitem [ref=e312]:
          - generic [ref=e313]: +
          - generic [ref=e314]:
            - paragraph [ref=e315]: 40% cheaper annual plan
            - paragraph [ref=e316]: $59.99/yr vs $99/yr. That's $39 less per year. Both apps use LLM-based coaches. The difference is the product layer built on top.
        - listitem [ref=e317]:
          - generic [ref=e318]: +
