      - paragraph [ref=e94]: How this comparison was made
      - paragraph [ref=e95]: "Google Health pricing was verified at store.google.com on 2026-05-14. Feature claims are sourced from the Google Health launch blog (blog.google, published 2026-05-07), the Google Health Coach post (blog.google, 2026-05), TechCrunch (published 2026-05-07), and the Fitbit Help Center (support.google.com/fitbit, checked 2026-05-14). Zealova features and pricing are sourced from internal app router audit and _ZEALOVA_FACTS.md v1.3 (audited 2026-05-14). Research citations: Shcherbina A et al. (2017, J Pers Med, doi:10.3390/jpm7020003) for wearable energy expenditure accuracy; Schoenfeld BJ, Ogborn D, Krieger JW (2017, J Sports Sci 35:11) for training volume dose-response; Burke LE, Wang J, Sevick MA (2011, J Am Diet Assoc 111:1) and Turner-McGrievy GM et al. (2019, J Acad Nutr Diet 119:9) for dietary self-monitoring adherence. I am the founder of Zealova. I am not a neutral third party. I have tried to concede every honest Google Health advantage. If something looks wrong, email me: sai@zealova.com."
